version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: futbol-uy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: futboluy
      POSTGRES_PASSWORD: futboluy_local
      POSTGRES_DB: futboluy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
